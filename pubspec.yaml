name: safetrace
description: Privacy-first harassment reporting system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.3
  http: ^1.2.1

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # State Management
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  gap: ^3.0.1

  # File & Media
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  permission_handler: ^11.3.1

  # WebSocket
  web_socket_channel: ^2.4.5

  # Date & Time
  intl: ^0.19.0

  # File open
  open_file: ^3.3.2
  path_provider: ^2.1.3

  # UUID
  uuid: ^4.4.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
