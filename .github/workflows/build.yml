name: Build APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Remove corrupt Android SDK 35
        run: |
          rm -rf /usr/local/lib/android/sdk/platforms/android-35
          rm -rf /usr/local/lib/android/sdk/platforms/android-36*

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: Fix compileSdk to 34
        run: |
          sed -i 's/compileSdk = 35/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk = 35/targetSdk = 34/g' android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safetrace-apk
          path: build/app/outputs/flutter-apk/app-release.apk
